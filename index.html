<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Target - 3x3 Deduction Engine (v2)</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <script>var Module = { onRuntimeInitialized: function() { onOpenCvReady(); } };</script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onerror="document.getElementById('status').innerText='Error loading OpenCV';"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; touch-action: none; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }
        .video-box { position: relative; width: 640px; height: 480px; max-width: 95vw; max-height: 38vh; border: 3px solid #444; border-radius: 12px; overflow: hidden; background: #000; flex-shrink: 0; }
        video, canvas.overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: fill; }
        canvas.overlay { pointer-events: none; z-index: 10; }
        
        /* ROTATING WHEEL UI */
        .playback-controls { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 15px; display: none; }
        .wheel-container { 
            width: 180px; height: 180px; border-radius: 50%; 
            background: conic-gradient(from 0deg, #1a1a1a, #333, #1a1a1a);
            position: relative; cursor: grab; 
            border: 4px solid #555; box-shadow: 0 4px 15px rgba(0,0,0,0.8); 
            touch-action: none; display: flex; justify-content: center; align-items: center;
        }
        .wheel-spinner { 
            width: 100%; height: 100%; position: absolute; border-radius: 50%; pointer-events: none; 
            background: repeating-conic-gradient(from 0deg, transparent 0deg 10deg, rgba(255,255,255,0.05) 10deg 20deg);
        }
        .wheel-indicator { position: absolute; top: 0; left: 50%; width: 8px; height: 20px; background: #00aaff; transform: translateX(-50%); border-radius: 4px; box-shadow: 0 0 8px #00aaff;}
        .wheel-center-btn { 
            position: absolute; width: 60px; height: 60px; border-radius: 50%; 
            background: #007bff; border: 3px solid #0056b3; color: white; 
            font-size: 20px; font-weight: bold; cursor: pointer; z-index: 10; 
            display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .playback-info { font-family: monospace; font-size: 16px; font-weight: bold; color: #00aaff; margin-top: 5px; }

        button { background: #007bff; color: white; border: none; padding: 10px 15px; font-size: 12px; cursor: pointer; border-radius: 6px; font-weight: bold; margin: 4px; }
        button:disabled { background: #444 !important; color: #888 !important; cursor: not-allowed; }
        #btnRecord.recording { background: #ff3b30; animation: pulse 1.5s infinite; }
        #status { font-weight: bold; font-size: 13px; color: #ffaa00; margin-bottom: 5px; text-transform: uppercase; }
        
        /* 3-COLUMN SIDEBAR UI */
        .dashboard { display: flex; width: 550px; flex-direction: column; background: #161616; padding: 10px; overflow-y: auto; border-left: 2px solid #333; }
        .model-container { width: 100%; height: 180px; background: #000; border: 1px solid #444; border-radius: 6px; margin-bottom: 10px; position: relative; flex-shrink: 0; }
        .graph-container { width: 100%; height: 80px; background: #000; border: 1px solid #444; border-radius: 6px; margin-bottom: 10px; position: relative; flex-shrink: 0; }
        .graph-label { position: absolute; top: 5px; left: 5px; font-size: 9px; color: #888; z-index: 20; background: rgba(0,0,0,0.6); padding: 2px 4px; border-radius: 3px;}
        
        .split-view { display: flex; gap: 8px; flex: 1; overflow-y: hidden;}
        .feed-col { display: flex; flex-direction: column; overflow-y: auto; }
        .feed-col h3 { font-size: 10px; color: #aaa; margin: 0 0 5px 0; border-bottom: 1px solid #333; padding-bottom: 3px; text-align: center; }
        
        /* Data Cards */
        .card { background: #222; border-radius: 6px; padding: 8px; border-left: 3px solid #444; margin-bottom: 8px; display: none; }
        .result-card.visible { display: block; animation: fadeIn 0.2s ease; }
        .card h4 { margin: 0 0 4px 0; font-size: 11px; text-transform: uppercase; }
        .mistake { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 4px 0; font-size: 10px; align-items: center;}
        .mistake:last-child { border-bottom: none; }
        .tag { font-size: 8px; font-weight: bold; border-radius: 3px; padding: 2px 4px; display: inline-block;}
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
